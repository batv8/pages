<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetARIV2 - XML to Graph Visualizer</title>
    
    <!-- Tailwind CSS cho giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vis-Network cho đồ thị Node & Edge -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        /* Tùy chỉnh vùng chứa đồ thị */
        #networkMap {
            width: 100%;
            height: 100%;
            border: 1px solid #e5e7eb;
            background-color: #f9fafb;
            border-radius: 0.5rem;
        }
        
        /* Tùy chỉnh thanh cuộn cho Textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        textarea::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans overflow-hidden">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <div>
            <h1 class="text-xl font-bold">XML to Graph Visualizer</h1>
            <p class="text-sm text-blue-200">Công cụ phân tích cấu trúc API Response (GetARIV2 / OTA_HotelAvailRS)</p>
        </div>
        <div class="text-sm bg-blue-700 px-3 py-1 rounded">
            Sử dụng chuột để Kéo & Cuộn (Zoom)
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 min-h-0">
        
        <!-- Sidebar: Input XML -->
        <aside class="w-full md:w-1/3 flex flex-col bg-white rounded-lg shadow-md p-4 min-h-0 shrink-0">
            <label for="xmlInput" class="font-semibold text-gray-700 mb-2">Nhập XML Response:</label>
            <textarea id="xmlInput" 
                      class="flex-1 w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm resize-none mb-4" 
                      placeholder="Dán mã XML từ Agoda GetARIV2 vào đây..."></textarea>
            
            <div class="flex gap-2">
                <button id="generateBtn" 
                        class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors shadow">
                    Tạo Sơ Đồ Graph
                </button>
                <button id="sampleBtn" 
                        class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded transition-colors shadow">
                    XML Mẫu
                </button>
            </div>
            <div id="statusMessage" class="mt-3 text-sm hidden font-medium"></div>
        </aside>

        <!-- Main Area: Graph Visualization -->
        <section class="w-full md:w-2/3 flex flex-col bg-white rounded-lg shadow-md p-4 min-h-0 relative">
            <div class="absolute top-6 left-6 z-10 flex gap-2">
                <button id="fitBtn" class="bg-white border border-gray-300 shadow-sm text-gray-700 px-3 py-1 rounded text-sm hover:bg-gray-50">
                    Căn giữa (Fit)
                </button>
            </div>
            <div id="networkMap"></div>
        </section>

    </main>

    <script>
        // Dữ liệu cho Vis-Network
        let nodes = new vis.DataSet([]);
        let edges = new vis.DataSet([]);
        let network = null;
        let nodeIdCounter = 1;

        // Cấu hình ban đầu của đồ thị
        const container = document.getElementById('networkMap');
        const data = { nodes: nodes, edges: edges };
        const options = {
            layout: {
                hierarchical: {
                    direction: "UD", // Up-Down (Từ trên xuống)
                    sortMethod: "directed",
                    nodeSpacing: 200,
                    levelSeparation: 150
                }
            },
            physics: {
                enabled: false // Tắt vật lý để cấu trúc dạng cây đứng yên, dễ đọc hơn
            },
            nodes: {
                shape: 'box',
                margin: 10,
                color: {
                    background: '#ffffff',
                    border: '#3b82f6',
                    highlight: {
                        background: '#eff6ff',
                        border: '#2563eb'
                    }
                },
                font: {
                    face: 'monospace',
                    size: 14,
                    align: 'left',
                    multi: true // Cho phép dùng in đậm bằng text
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                color: '#9ca3af',
                smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 }
            },
            interaction: {
                dragNodes: true,
                zoomView: true,
                dragView: true
            }
        };

        // Khởi tạo Network
        network = new vis.Network(container, data, options);

        // Nút bấm "Căn giữa"
        document.getElementById('fitBtn').addEventListener('click', () => {
            if (network) network.fit({ animation: true });
        });

        // Hàm đệ quy duyệt DOM XML và tạo Node/Edge
        function traverseXML(xmlNode, parentId) {
            // Chỉ xử lý các Element node (bỏ qua text node rỗng, comment...)
            if (xmlNode.nodeType !== 1) return; 

            const currentId = nodeIdCounter++;

            // 1. Tên thẻ
            let labelText = `<b>${xmlNode.nodeName}</b>`;

            // 2. Lấy thuộc tính (Attributes)
            let attrStrings = [];
            for (let i = 0; i < xmlNode.attributes.length; i++) {
                let attr = xmlNode.attributes[i];
                attrStrings.push(`${attr.name}="${attr.value}"`);
            }
            if (attrStrings.length > 0) {
                // Hiển thị attributes mỗi dòng 1 cái hoặc nối liền tuỳ thẩm mỹ
                labelText += `\n<i style="color: #6b7280; font-size: 12px;">${attrStrings.join('\n')}</i>`;
            }

            // 3. Lấy nội dung text (chỉ lấy nếu node này không có node con nào dạng thẻ)
            let hasElementChild = false;
            for (let i = 0; i < xmlNode.childNodes.length; i++) {
                if (xmlNode.childNodes[i].nodeType === 1) {
                    hasElementChild = true;
                    break;
                }
            }

            if (!hasElementChild && xmlNode.textContent.trim() !== "") {
                labelText += `\n<b style="color: #16a34a;">${xmlNode.textContent.trim()}</b>`;
            }

            // Thêm Node
            nodes.add({
                id: currentId,
                label: labelText,
                title: xmlNode.nodeName // tooltip khi hover
            });

            // Thêm Edge (liên kết với node cha)
            if (parentId !== null) {
                edges.add({
                    from: parentId,
                    to: currentId
                });
            }

            // Gọi đệ quy cho các node con
            for (let i = 0; i < xmlNode.childNodes.length; i++) {
                traverseXML(xmlNode.childNodes[i], currentId);
            }
        }

        // Xử lý sự kiện nút "Tạo Sơ Đồ Graph"
        document.getElementById('generateBtn').addEventListener('click', () => {
            const xmlString = document.getElementById('xmlInput').value.trim();
            const statusEl = document.getElementById('statusMessage');
            
            if (!xmlString) {
                statusEl.textContent = "Vui lòng nhập XML trước!";
                statusEl.className = "mt-3 text-sm block font-medium text-red-600";
                return;
            }

            try {
                // Parse XML String thành DOM Document
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlString, "application/xml");

                // Kiểm tra lỗi parse của trình duyệt
                const parseError = xmlDoc.getElementsByTagName("parsererror");
                if (parseError.length > 0) {
                    throw new Error("XML không hợp lệ (Sai cú pháp).");
                }

                // Reset Graph
                nodes.clear();
                edges.clear();
                nodeIdCounter = 1;

                // Bắt đầu duyệt từ node gốc
                const rootElement = xmlDoc.documentElement;
                traverseXML(rootElement, null);

                // Fit lại viewport
                setTimeout(() => network.fit({ animation: true }), 100);

                statusEl.textContent = `Thành công! Đã render ${nodes.length} nodes.`;
                statusEl.className = "mt-3 text-sm block font-medium text-green-600";

            } catch (error) {
                console.error(error);
                statusEl.textContent = error.message || "Đã xảy ra lỗi khi phân tích XML.";
                statusEl.className = "mt-3 text-sm block font-medium text-red-600";
            }
        });

        // Thêm XML mẫu (Một đoạn nhỏ của ARI)
        document.getElementById('sampleBtn').addEventListener('click', () => {
            const sampleXML = `<?xml version="1.0" encoding="UTF-8"?>
<OTA_HotelAvailRS Version="2.0">
  <RoomStays>
    <RoomStay>
      <RoomTypes>
        <RoomType RoomTypeCode="STD">
          <RoomDescription Name="Standard Room"/>
        </RoomType>
      </RoomTypes>
      <RatePlans>
        <RatePlan RatePlanCode="BAR">
          <Rates>
            <Rate EffectiveDate="2026-03-25" ExpireDate="2026-03-26">
              <Base AmountAfterTax="100.00" CurrencyCode="USD"/>
            </Rate>
          </Rates>
        </RatePlan>
      </RatePlans>
    </RoomStay>
  </RoomStays>
</OTA_HotelAvailRS>`;
            document.getElementById('xmlInput').value = sampleXML;
        });

    </script>
</body>
</html>
